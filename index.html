<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#d4d0c8;
    font-family:"MS Sans Serif", Tahoma, sans-serif;
}

/* BOTÓN */
button{
    cursor:pointer;
}

/* OVERLAY */
.win98-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.15);
    display:none;
    justify-content:center;
    align-items:center;
}

/* VENTANA */
.win98-window{
    width:340px;
    background:#c0c0c0;

    border-top:2px solid #fff;
    border-left:2px solid #fff;
    border-right:2px solid #000;
    border-bottom:2px solid #000;

    box-shadow:
        inset -1px -1px #808080,
        inset 1px 1px #dfdfdf;
}

/* BARRA SUPERIOR */
.win98-titlebar{
    height:28px;
    background:rgb(28, 82, 126);
    color:white;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 6px;
    font-weight:bold;
    font-size:14px;
}

/* BOTÓN X */
.win98-close{
    width:20px;
    height:20px;

    background:#c0c0c0;

    border-top:2px solid #fff;
    border-left:2px solid #fff;
    border-right:2px solid #000;
    border-bottom:2px solid #000;

    font-weight:bold;
}

/* CONTENIDO */
.win98-content{
    padding:35px 20px;
    text-align:center;
    font-size:16px;
}

/* BOTONES */
.win98-buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.win98-btn{
    min-width:90px;
    padding:6px 12px;

    background:#c0c0c0;

    border-top:2px solid #fff;
    border-left:2px solid #fff;
    border-right:2px solid #000;
    border-bottom:2px solid #000;

    font-size:14px;
}

.win98-btn:active{
    border-top:2px solid #000;
    border-left:2px solid #000;
    border-right:2px solid #fff;
    border-bottom:2px solid #fff;
}
</style>

</div>

}
